<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>720-Word Basis Map -- Quantum Grammar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0a;
    color: #c0c0c0;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
}
#graph-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}
svg {
    width: 100%;
    height: 100%;
}
.link {
    stroke: #333;
    stroke-opacity: 0.4;
    stroke-width: 0.5;
}
.link.highlighted {
    stroke: #c0a060;
    stroke-opacity: 0.8;
    stroke-width: 1.5;
}
.node circle {
    stroke: #222;
    stroke-width: 0.5;
    cursor: pointer;
}
.node circle:hover {
    stroke: #c0a060;
    stroke-width: 2;
}
.node text {
    fill: #888;
    font-size: 8px;
    pointer-events: none;
    font-family: 'Courier New', monospace;
}
.node.selected circle {
    stroke: #c0a060;
    stroke-width: 2.5;
}
.node.search-match circle {
    stroke: #fff;
    stroke-width: 2;
}
.node.dimmed circle {
    opacity: 0.15;
}
.node.dimmed text {
    opacity: 0.1;
}

/* Controls Panel */
#controls {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(15, 15, 15, 0.92);
    border: 1px solid #333;
    padding: 14px;
    border-radius: 4px;
    z-index: 10;
    width: 260px;
    max-height: calc(100vh - 24px);
    overflow-y: auto;
}
#controls h2 {
    color: #c0a060;
    font-size: 14px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}
#controls h3 {
    color: #888;
    font-size: 11px;
    margin: 10px 0 5px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#search {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #c0c0c0;
    padding: 6px 8px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    border-radius: 3px;
    margin-bottom: 8px;
}
#search:focus {
    outline: none;
    border-color: #c0a060;
}
.filter-group {
    margin-bottom: 6px;
}
.filter-group label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    cursor: pointer;
    margin-right: 6px;
    margin-bottom: 3px;
}
.filter-group input[type="checkbox"] {
    accent-color: #c0a060;
}
.color-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 2px;
}

/* Info Panel */
#info-panel {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(15, 15, 15, 0.92);
    border: 1px solid #333;
    padding: 14px;
    border-radius: 4px;
    z-index: 10;
    width: 320px;
    display: none;
}
#info-panel h2 {
    color: #c0a060;
    font-size: 16px;
    margin-bottom: 8px;
}
#info-panel .field {
    font-size: 11px;
    margin-bottom: 4px;
}
#info-panel .field span.label {
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#info-panel .field span.value {
    color: #c0c0c0;
}
#info-panel .field span.negated {
    color: #cc4444;
}
#info-panel .field span.direct {
    color: #44aa44;
}
#info-panel .related {
    margin-top: 8px;
    font-size: 11px;
    color: #888;
}
#info-panel .related span {
    color: #c0a060;
    cursor: pointer;
}
#info-panel .related span:hover {
    text-decoration: underline;
}

/* Stats Panel */
#stats {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(15, 15, 15, 0.92);
    border: 1px solid #333;
    padding: 14px;
    border-radius: 4px;
    z-index: 10;
    width: 220px;
}
#stats h2 {
    color: #c0a060;
    font-size: 14px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}
#stats .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 3px;
}
#stats .stat-row .stat-label {
    color: #888;
}
#stats .stat-row .stat-value {
    color: #c0c0c0;
    font-weight: bold;
}
#stats .stat-section {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #222;
}
#stats .stat-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
}
.stat-section h3 {
    color: #666;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
}
</style>
</head>

ntract"}, {"source": 278, "target": 475, "root": "agree"}, {"source": 294, "target": 610, "root": "counsel"}, {"source": 312, "target": 367, "root": "charge"}, {"source": 313, "target": 698, "root": "sent"}, {"source": 320, "target": 479, "root": "cord"}, {"source": 332, "target": 472, "root": "grant"}, {"source": 336, "target": 527, "root": "mortgag"}, {"source": 340, "target": 529, "root": "lien"}, {"source": 343, "target": 523, "root": "sur"}, {"source": 346, "target": 524, "root": "derwrit"}, {"source": 356, "target": 515, "root": "forfeit"}, {"source": 357, "target": 505, "root": "seiz"}, {"source": 358, "target": 506, "root": "arrest"}, {"source": 360, "target": 508, "root": "prison"}, {"source": 364, "target": 511, "root": "acquitt"}, {"source": 372, "target": 397, "root": "venue"}, {"source": 398, "target": 518, "root": "tax"}, {"source": 399, "target": 517, "root": "assess"}, {"source": 400, "target": 516, "root": "levy"}, {"source": 404, "target": 519, "root": "pay"}, {"source": 419, "target": 445, "root": "voice"}, {"source": 490, "target": 544, "root": "rul"}, {"source": 509, "target": 582, "root": "leas"}, {"source": 637, "target": 639, "root": "lawful"}, {"source": 638, "target": 640, "root": "legal"}, {"source": 641, "target": 642, "root": "voluntari"}, {"source": 677, "target": 678, "root": "conditional"}];
    const roleStats = {"preposition": 62, "article": 63, "adjective": 126, "noun": 219, "verb": 145, "adverb": 105};
    const jurStats = {"land/soil": 273, "air/ether": 141, "sea/water": 306};
    const negCount = 143;
    const totalCount = nodes.length;

    // Color maps
    const roleColors = {
        preposition: '#9b59b6',
        article: '#7f8c8d',
        adjective: '#00bcd4',
        noun: '#2d5a27',
        verb: '#1a4a7a',
        adverb: '#c0392b'
    };

    const jurColors = {
        'land/soil': '#2d5a27',
        'sea/water': '#1a4a7a',
        'air/ether': '#7a4a1a'
    };

    // Populate stats
    const statsRole = document.getElementById('stats-role');
    for (const [role, count] of Object.entries(roleStats)) {
        statsRole.innerHTML += '<div class="stat-row"><span class="stat-label">' +
            role + '</span><span class="stat-value">' + count + '</span></div>';
    }

    const statsJur = document.getElementById('stats-jur');
    for (const [jur, count] of Object.entries(jurStats)) {
        statsJur.innerHTML += '<div class="stat-row"><span class="stat-label">' +
            jur + '</span><span class="stat-value">' + count + '</span></div>';
    }

    const statsNeg = document.getElementById('stats-neg');
    statsNeg.innerHTML = '<div class="stat-row"><span class="stat-label">VCC Negated</span>' +
        '<span class="stat-value">' + negCount + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Direct</span>' +
        '<span class="stat-value">' + (totalCount - negCount) + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">Total</span>' +
        '<span class="stat-value">' + totalCount + '</span></div>';

    // Build SVG
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select('#graph-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height);

    // Zoom behavior
    const g = svg.append('g');
    const zoom = d3.zoom()
        .scaleExtent([0.1, 8])
        .on('zoom', (event) => {
            g.attr('transform', event.transform);
        });
    svg.call(zoom);

    // Force simulation
    const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(edges).id((d, i) => i).distance(60).strength(0.3))
        .force('charge', d3.forceManyBody().strength(-15))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.complexity) * 3 + 4));

    // Draw edges
    const link = g.append('g')
        .selectAll('line')
        .data(edges)
        .join('line')
        .attr('class', 'link');

    // Draw nodes
    const node = g.append('g')
        .selectAll('g')
        .data(nodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

    node.append('circle')
        .attr('r', d => Math.sqrt(d.complexity) * 3 + 2)
        .attr('fill', d => roleColors[d.role] || '#666');

    node.append('text')
        .attr('dx', d => Math.sqrt(d.complexity) * 3 + 4)
        .attr('dy', 3)
        .text(d => d.word);

    // Click handler for info panel
    let selectedNode = null;

    node.on('click', function(event, d) {
        event.stopPropagation();
        selectedNode = d;
        showInfo(d);
        highlightConnections(d);
        d3.selectAll('.node').classed('selected', false);
        d3.select(this).classed('selected', true);
    });

    svg.on('click', function() {
        selectedNode = null;
        document.getElementById('info-panel').style.display = 'none';
        d3.selectAll('.node').classed('selected', false);
        d3.selectAll('.link').classed('highlighted', false);
        d3.selectAll('.node').classed('dimmed', false);
    });

    function showInfo(d) {
        const panel = document.getElementById('info-panel');
        panel.style.display = 'block';
        document.getElementById('info-word').textContent = d.word.toUpperCase();
        document.getElementById('info-role').textContent = d.role;
        document.getElementById('info-jur').textContent = d.jurisdiction;
        document.getElementById('info-root').textContent = d.root;
        document.getElementById('info-complexity').textContent = d.complexity + ' morpheme(s)';

        const negSpan = document.getElementById('info-neg');
        if (d.negated) {
            negSpan.className = 'negated';
            negSpan.textContent = 'YES -- VCC prefix inverts root meaning';
        } else {
            negSpan.className = 'direct';
            negSpan.textContent = 'NO -- direct meaning';
        }

        // Find related words (shared root)
        const related = nodes.filter(n => n.root === d.root && n.word !== d.word);
        const relDiv = document.getElementById('info-related');
        if (related.length > 0) {
            relDiv.innerHTML = '<span class="label">Shared root [' + d.root + ']: </span>' +
                related.map(r => '<span onclick="selectWord(\'' + r.word + '\')">' + r.word + '</span>').join(', ');
        } else {
            relDiv.innerHTML = '<span class="label">No shared-root connections</span>';
        }
    }

    function highlightConnections(d) {
        const idx = nodes.indexOf(d);
        const connectedIndices = new Set();
        connectedIndices.add(idx);

        link.classed('highlighted', function(l) {
            const src = typeof l.source === 'object' ? nodes.indexOf(l.source) : l.source;
            const tgt = typeof l.target === 'object' ? nodes.indexOf(l.target) : l.target;
            if (src === idx || tgt === idx) {
                connectedIndices.add(src);
                connectedIndices.add(tgt);
                return true;
            }
            return false;
        });

        node.classed('dimmed', function(n) {
            return !connectedIndices.has(nodes.indexOf(n));
        });
    }

    // Global function for clicking related words
    window.selectWord = function(word) {
        const d = nodes.find(n => n.word === word);
        if (d) {
            showInfo(d);
            highlightConnections(d);
            d3.selectAll('.node').classed('selected', false);
            d3.selectAll('.node').filter(n => n.word === word).classed('selected', true);
        }
    };

    // Search
    const searchInput = document.getElementById('search');
    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        if (query === '') {
            d3.selectAll('.node').classed('search-match', false).classed('dimmed', false);
            d3.selectAll('.node text').style('font-size', null);
            return;
        }
        node.classed('search-match', d => d.word.toLowerCase().includes(query));
        node.classed('dimmed', d => !d.word.toLowerCase().includes(query));
    });

    // Filters
    function applyFilters() {
        const activeRoles = new Set();
        document.querySelectorAll('#role-filters input:checked').forEach(cb => {
            activeRoles.add(cb.dataset.role);
        });

        const activeJurs = new Set();
        document.querySelectorAll('#jur-filters input:checked').forEach(cb => {
            activeJurs.add(cb.dataset.jur);
        });

        const activeNegs = new Set();
        document.querySelectorAll('#neg-filters input:checked').forEach(cb => {
            activeNegs.add(cb.dataset.neg);
        });

        node.style('display', d => {
            const roleMatch = activeRoles.has(d.role);
            const jurMatch = activeJurs.has(d.jurisdiction);
            const negMatch = activeNegs.has(String(d.negated));
            return (roleMatch && jurMatch && negMatch) ? null : 'none';
        });

        link.style('display', l => {
            const src = typeof l.source === 'object' ? l.source : nodes[l.source];
            const tgt = typeof l.target === 'object' ? l.target : nodes[l.target];
            const srcVisible = activeRoles.has(src.role) && activeJurs.has(src.jurisdiction) && activeNegs.has(String(src.negated));
            const tgtVisible = activeRoles.has(tgt.role) && activeJurs.has(tgt.jurisdiction) && activeNegs.has(String(tgt.negated));
            return (srcVisible && tgtVisible) ? null : 'none';
        });
    }

    document.querySelectorAll('#controls input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', applyFilters);
    });

    // Simulation tick
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

        node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
    });

    // Drag functions
    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    // Initial zoom to fit
    svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.8));

})();
</script>
</body>
</html>
