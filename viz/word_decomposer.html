const quickWords = Object.keys(dictionary);

const qwContainer = document.getElementById('quickWords');
quickWords.forEach(w => {
  const btn = document.createElement('button');
  btn.className = 'qw-btn';
  btn.textContent = w;
  btn.addEventListener('click', () => {
    document.getElementById('wordInput').value = w;
    decompose(w);
  });
  qwContainer.appendChild(btn);
});

const input = document.getElementById('wordInput');
input.addEventListener('input', () => {
  const val = input.value.trim().toLowerCase();
  if (val) decompose(val);
  else document.getElementById('decompArea').innerHTML = '<div class="empty-state">Enter a word above to decompose it into its true morphological components</div>';
});

function decompose(word) {
  const entry = dictionary[word];
  if (!entry) {
    document.getElementById('decompArea').innerHTML = `<div class="empty-state">Word "${word}" not in database. Try one of the quick-access words below the input.</div>`;
    return;
  }

  let html = '<div class="morpheme-display">';

  const parts = [entry.prefix, entry.root, entry.suffix].filter(Boolean);
  parts.forEach((part, i) => {
    const role = part === entry.prefix ? 'prefix' : part === entry.root ? 'root' : 'suffix';
    const roleName = part === entry.prefix ? 'PREFIX' : part === entry.root ? 'ROOT' : 'SUFFIX';

    if (i > 0) html += '<div class="separator">|</div>';

    let jurBadge = '';
    if (part.jurisdiction === 'land') jurBadge = '<div class="jurisdiction-badge jur-land">LAND / SOIL</div>';
    else if (part.jurisdiction === 'sea') jurBadge = '<div class="jurisdiction-badge jur-sea">SEA / WATER</div>';
    else if (part.jurisdiction === 'air') jurBadge = '<div class="jurisdiction-badge jur-air">AIR / ETHER</div>';

    let negBadge = '';
    if (part.vcc) negBadge = '<div class="negation-badge">VCC NEGATION</div>';

    html += `
      <div class="morpheme-card ${role}" style="animation-delay:${i * 0.15}s">
        <div class="morpheme-role">${roleName}</div>
        <div class="morpheme-text">${part.text}</div>
        <div class="morpheme-meaning">${part.meaning}</div>
        <div class="morpheme-origin">${part.origin}</div>
        ${negBadge}
        ${jurBadge}
      </div>
    `;
  });

  html += '</div>';

  // True meaning vs assumed
  html += `
    <div class="vs-meaning">
      <div class="vs-card true-card">
        <div class="vs-label">What it actually says</div>
        <div class="vs-text-true">${entry.trueMeaning}</div>
      </div>
      <div class="vs-divider">vs</div>
      <div class="vs-card assumed-card">
        <div class="vs-label">What you think it means</div>
        <div class="vs-text-assumed">${entry.assumedMeaning}</div>
      </div>
    </div>
  `;

  // Etymology
  html += `<div class="etymology"><span>Etymology:</span> ${entry.etymology}</div>`;

  // Side panels
  html += '<div class="side-panel">';

  // Documents panel
  html += '<div class="doc-panel"><h3>Where this word appears</h3>';
  const docIcons = { 'Birth': '\u{1F4C4}', 'Certificate': '\u{1F4DC}', 'Court': '\u{2696}', 'Tax': '\u{1F4B0}', 'Contract': '\u{1F4DD}', 'Mortgage': '\u{1F3E0}', 'License': '\u{1F4CB}', 'Bank': '\u{1F3E6}', 'Insurance': '\u{1F6E1}', default: '\u{1F4C3}' };
  (entry.documents || []).forEach(doc => {
    let icon = '\u{1F4C3}';
    for (const [key, val] of Object.entries(docIcons)) {
      if (doc.includes(key)) { icon = val; break; }
    }
    html += `<div class="doc-item"><span class="doc-icon">${icon}</span> ${doc}</div>`;
  });
  html += '</div>';

  // VCC analysis
  const hasVCC = parts.some(p => p.vcc);
  html += '<div class="vcc-panel"><h3>VCC Negation Analysis</h3>';
  if (hasVCC) {
    const vccPart = parts.find(p => p.vcc);
    html += `
      <div class="vcc-rule"><span class="highlight">NEGATION DETECTED</span></div>
      <div class="vcc-rule">Prefix "<span class="highlight">${vccPart.text}</span>" follows the Vowel-Consonant-Consonant pattern</div>
      <div class="vcc-rule">This prefix <span class="highlight">INVERTS</span> the meaning of the root</div>
      <div class="vcc-rule">True meaning: <span class="gold">${entry.trueMeaning}</span></div>
      <div class="vcc-rule">The word says the <span class="highlight">OPPOSITE</span> of what you assume</div>
    `;
  } else {
    html += `
      <div class="vcc-rule"><span class="gold">NO VCC NEGATION</span></div>
      <div class="vcc-rule">This word does not begin with a VCC negation prefix</div>
      <div class="vcc-rule">The decomposition reveals meaning through <span class="gold">direct morpheme analysis</span></div>
      <div class="vcc-rule">True meaning: <span class="gold">${entry.trueMeaning}</span></div>
    `;
  }
  html += '</div></div>';

  document.getElementById('decompArea').innerHTML = html;
}

// Start with a default word
decompose('insurance');
